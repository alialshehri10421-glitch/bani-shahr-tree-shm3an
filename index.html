<!DOCTYPE html>

<head>

<title>مشجرة أنساب قبائل بني شهر</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Amiri',serif;background:#1c1a17;color:#f0e6d0;min-height:100vh;}
.hero{background:#252320;border-bottom:1px solid rgba(200,169,110,.3);padding:28px 20px 20px;text-align:center;}
.basmala{display:block;font-size:.9rem;color:#6a5a40;margin-bottom:10px;}
.hero h1{font-size:1.8rem;font-weight:700;color:#c8a96e;}
.divider{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px auto 8px;}
.dline{height:1px;width:50px;background:#7a5c2e;}
.ddot{width:5px;height:5px;border-radius:50%;background:#c8a96e;}
.credit{font-size:.75rem;color:#6a5a40;line-height:1.8;}
.btns{margin-top:12px;display:flex;justify-content:center;gap:12px;}
.btn1{font-family:'Amiri',serif;font-size:.88rem;background:#c8a96e;color:#1c1a17;border:none;padding:7px 20px;border-radius:20px;cursor:pointer;font-weight:700;}
.btn2{font-family:'Amiri',serif;font-size:.88rem;background:transparent;color:#c8a96e;border:1px solid rgba(200,169,110,.5);padding:7px 20px;border-radius:20px;cursor:pointer;}
#area{padding:30px 20px 80px 20px;padding-bottom:60px;overflow-y:auto;overflow-x:hidden;}
/* الصناديق */
.box{
  display:inline-block;
  border:1px solid rgba(200,169,110,.4);
  padding:8px 16px;
  font-family:'Amiri',serif;
  font-weight:700;
  font-size:1rem;
  background:#2e2b27;
  color:#f0e6d0;
  white-space:nowrap;
  text-align:center;
  border-radius:4px;
  cursor:default;
  position:relative;
  z-index:2;
}
.box.clickable{cursor:pointer;}
.box.clickable:hover{background:#3a3530;border-color:rgba(200,169,110,.8);color:#c8a96e;}
.box.open{background:#c8a96e;color:#1c1a17;border-color:#c8a96e;}
.box.root{font-size:1.3rem;padding:10px 32px;}
.hint{text-align:center;padding:10px;font-size:.8rem;color:#6a5a40;}
#searchBar{padding:10px 20px;display:flex;flex-direction:column;align-items:center;position:relative;}
#searchInput{font-family:'Amiri',serif;font-size:1rem;padding:8px 16px;border-radius:20px;border:1px solid rgba(200,169,110,.5);background:#252320;color:#f0e6d0;width:280px;outline:none;direction:rtl;}
#searchInput::placeholder{color:#6a5a40;}
#searchResults{position:absolute;top:52px;width:280px;max-height:220px;overflow-y:auto;border-radius:8px;z-index:100;}
.sResult{display:block;padding:8px 14px;cursor:pointer;color:#f0e6d0;border-bottom:1px solid rgba(200,169,110,.15);background:#252320;font-family:'Amiri',serif;font-size:.95rem;}
.sResult:hover{background:#3a3530;color:#c8a96e;}
.box.selected{background:#c8a96e;color:#1c1a17;border-color:#c8a96e;}
#breadcrumb{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:10px;background:#1c1a17;color:#c8a96e;font-size:1rem;border-top:1px solid #3a3020;min-height:36px;z-index:999;}
@media(max-width:600px){
  .hero h1{font-size:1.2rem;}
  .credit{font-size:.7rem;}
  #searchInput{width:220px;}
  #searchResults{width:220px;}
  #breadcrumb{font-size:.82rem;padding:7px;}
  .box{font-size:.85rem;}
  .box.root{font-size:1rem;padding:8px 18px;}
}
</style>
</head>

    total -= PAD_H;
    var cur = cx + total/2;
    for(var j=0;j<node.k.length;j++){
    cur -= mw(node.k[j].n);
      layout(node.k[j], cur, childY);
      cur -= PAD_H;
    }
  }
}

function render(){
  // احسب التخطيط
  positions = {};
  layout(T, 0, 0);
  var areaW=area.clientWidth||800;
  var sh=Math.round(areaW/2-positions[T.i].cx);
  for(var id in positions){positions[id].x+=sh;positions[id].cx+=sh;}
  var mn=0;for(var id in positions){if(positions[id].x<mn)mn=positions[id].x;}
  if(mn<0){for(var id in positions){positions[id].x-=mn;positions[id].cx-=mn;}}

  // حدد أبعاد الـ canvas
  var maxX=0, maxY=0;
  for(var id in positions){
    var p=positions[id];
    if(p.x+p.w > maxX) maxX=p.x+p.w;
    if(p.y+BOX_H > maxY) maxY=p.y+BOX_H;
  }
  maxX += 20; maxY += 20;

  canvasEl.style.width = Math.max(maxX, area.clientWidth||800)+'px';
  canvasEl.style.height = maxY+'px';
  canvasEl.style.position = 'relative';

  // ارسم الخطوط SVG
  svgEl.setAttribute('width', maxX);
  svgEl.setAttribute('height', maxY);
  svgEl.innerHTML = '';

  function line(x1,y1,x2,y2){
    var l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',Math.round(x1)); l.setAttribute('y1',Math.round(y1));
    l.setAttribute('x2',Math.round(x2)); l.setAttribute('y2',Math.round(y2));
    l.setAttribute('stroke','#c8a96e'); l.setAttribute('stroke-width','2');
    l.setAttribute('stroke-linecap','round');
    svgEl.appendChild(l);
  }

  function drawLines(node){
    if(!opened[node.i] || !node.k || !node.k.length) return;
    var p = positions[node.i];
    if(!p) return;
    var py = p.y + BOX_H;
    var midY = py + GAP_V/2;

    // خط عمودي من الأب
    line(p.cx, py, p.cx, midY);

    var kids = node.k;
    if(kids.length === 1){
      var cp = positions[kids[0].i];
      if(cp) line(p.cx, midY, cp.cx, midY + GAP_V/2);
    } else {
      // خط أفقي
      var firstP = positions[kids[0].i];
      var lastP  = positions[kids[kids.length-1].i];
      if(firstP && lastP){
        line(firstP.cx, midY, lastP.cx, midY);
        for(var j=0;j<kids.length;j++){
          var kp=positions[kids[j].i];
          if(kp) line(kp.cx, midY, kp.cx, kp.y);
        }
      }
    }
    for(var j=0;j<kids.length;j++) drawLines(kids[j]);
  }
  drawLines(T);

  // ارسم الصناديق
  // أولاً: أزل الصناديق القديمة
  var oldBoxes = canvasEl.querySelectorAll('.box');
  for(var i=0;i<oldBoxes.length;i++) canvasEl.removeChild(oldBoxes[i]);

  function drawBoxes(node){
    var p = positions[node.i];
    if(!p) return;
    var hasK = node.k && node.k.length > 0;
    var isR  = node.i==='hajar';
    var isO  = !!opened[node.i];

    var el = boxes[node.i];
    if(!el){
      el = document.createElement('div');
      el.className='box'+(isR?' root':'')+(hasK?' clickable':'');
      el.textContent=node.n;
      boxes[node.i] = el;
      if(hasK){
        (function(nid){
          el.onclick = function(e){
            e.stopPropagation();
            if(opened[nid]){
              delete opened[nid];
              closeAll(findNode(nid));
            } else {
              var par=findPar(nid);
              if(par&&par.k) par.k.forEach(function(s){if(s.i!==nid){delete opened[s.i];closeAll(s);}});
              opened[nid]=true;
            }
             render();
            updateBC(nid);
          };
        })(node.i);
      }
    }
if(!hasK){
  (function(nid){
    el.onclick=function(e){
      e.stopPropagation();
      selected=nid;
      for(var bid in boxes)boxes[bid].classList.remove('selected');
      if(boxes[nid])boxes[nid].classList.add('selected');
      render();
      updateBC(nid);
    };
  })(node.i);
}
    // حدّث الكلاسات
    el.className='box'+(isR?' root':'')+(isO&&hasK?' open':'')+(hasK?' clickable':'')+(selected===node.i?' selected':'');
    el.style.cssText = 'left:'+p.x+'px;top:'+p.y+'px;width:'+p.w+'px;height:'+BOX_H+'px;position:absolute;line-height:'+BOX_H+'px;padding:0 12px;';
    canvasEl.appendChild(el);

    if(opened[node.i] && hasK)
      node.k.forEach(function(k){drawBoxes(k);});
  }
  drawBoxes(T);
}

function closeAll(node){
  if(!node) return;
  delete opened[node.i];
  if(node.k) node.k.forEach(function(k){closeAll(k);});
}

function openAllFn(node){
  if(!node) node=T;
  if(node.k&&node.k.length){
    opened[node.i]=true;
    node.k.forEach(function(k){openAllFn(k);});
  }
}

// إنشاء العناصر
var area = document.getElementById('area');
canvasEl = document.createElement('div');
canvasEl.style.cssText = 'position:relative;direction:ltr;';
svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
svgEl.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
canvasEl.appendChild(svgEl);
area.appendChild(canvasEl);

function getPath(id,node,path){
  if(!node)node=T;if(!path)path=[];
  if(node.i===id)return [node.n].concat(path);
  for(var j=0;j<(node.k||[]).length;j++){
    var r=getPath(id,node.k[j],[node.n].concat(path));
    if(r)return r;
  }
  return null;
}

var aliases={'بلجدع':'ajda3','بلجرد':'ajrad','برياع':'binryaa'};

function normalize(s){
  if(!s)return'';
  s=s.replace(/[\u064B-\u065F\u0640]/g,'');
  s=s.replace(/[أإآ]/g,'ا');
  s=s.replace(/ى/g,'ا');
  s=s.replace(/ئ/g,'ي');
  s=s.replace(/ة/g,'ه');
  s=s.replace(/(^|\s)(آل|بني)\s*/g,' ');
  return s.trim();
}
function searchTree(q,node,res){
  if(!node)node=T;if(!res)res=[];
  if(node.n&&normalize(node.n).indexOf(normalize(q))!==-1)res.push(node);
  (node.k||[]).forEach(function(k){searchTree(q,k,res);});
  return res;
}
function openPathTo(target,node){
  if(!node)node=T;
  if(node.i===target.i){opened[node.i]=true;return true;}
  for(var j=0;j<(node.k||[]).length;j++){
    if(openPathTo(target,node.k[j])){opened[node.i]=true;return true;}
  }
  return false;
}
var si=document.getElementById('searchInput');
var sr=document.getElementById('searchResults');
si.addEventListener('input',function(){
  sr.innerHTML='';
  var q=si.value.trim();
  if(!q)return;
  var res=searchTree(q);
  var nq=normalize(q);
  for(var ak in aliases){
    if(nq.indexOf(normalize(ak))!==-1||normalize(ak).indexOf(nq)!==-1){
      var an=findNode(aliases[ak]);
      if(an){var dup=false;for(var ri=0;ri<res.length;ri++)if(res[ri].i===an.i)dup=true;if(!dup)res.unshift(an);}
    }
  }
  res.slice(0,10).forEach(function(node){
    var d=document.createElement('div');
    d.className='sResult';
    var p=getPath(node.i);
    d.innerHTML='<div>'+node.n+'</div><div style="font-size:.72rem;color:#a08040;margin-top:3px;">'+(p?p.join(' ← '):'')+' </div>';
    d.onclick=function(){
      opened={};
      openPathTo(node);
      selected=node.i;
      render();
      updateBC(node.i);
      sr.innerHTML='';si.value='';
      setTimeout(function(){
        var el=boxes[node.i];
        if(el)el.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});
      },150);
    };
    sr.appendChild(d);
  });
});
render();

document.getElementById('btnOpen').onclick  = function(){openAllFn(T);render();};
document.getElementById('btnClose').onclick = function(){
  opened={hajar:true,shaher:true};
  boxes={};
  render();
};
</script>
<div id="breadcrumb"></div>
</body>
